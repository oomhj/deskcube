; PlatformIO Project Configuration File

; ===================== 公共基础 =====================
[common]
platform = espressif8266
board = nodemcu
framework = arduino
board_build.flash_mode = dout
board_build.f_cpu = 80000000L
upload_protocol = esptool
upload_speed = 115200
board_build.ldscript = eagle.flash.4m1m.ld

; ===================== 接收端 =====================
[env:nodemcu_receiver]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
board_build.flash_mode = ${common.board_build.flash_mode}
board_build.f_cpu = ${common.board_build.f_cpu}
upload_protocol = ${common.upload_protocol}
upload_port = /dev/cu.usbserial-1130
upload_speed = ${common.upload_speed}
board_build.ldscript = ${common.board_build.ldscript}
lib_deps = 
	bodmer/TFT_eSPI@^2.5.43
build_flags = 
	-Os
	-include $PROJECT_DIR/User_Setup.h
	-DUSER_SETUP_LOADED=1
	-DESPNOW_MODE_RECEIVER
	-DSERIAL_RX_BUFFER_SIZE=512

; ===================== 基站 =====================
[env:nodemcu_sender]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
board_build.flash_mode = ${common.board_build.flash_mode}
board_build.f_cpu = ${common.board_build.f_cpu}
upload_protocol = ${common.upload_protocol}
upload_port = /dev/cu.usbserial-1140
upload_speed = ${common.upload_speed}
board_build.ldscript = ${common.board_build.ldscript}
lib_deps = 
	bodmer/TFT_eSPI@^2.5.43
build_flags = 
	-Os
	-include $PROJECT_DIR/User_Setup.h
	-DUSER_SETUP_LOADED=1
	-DESPNOW_MODE_SENDER
	-DSERIAL_RX_BUFFER_SIZE=512

; 排除接收端源码
src_filter = +<*> -<espnow_receiver.cpp>

; ===================== 基站自测模式（渐变彩条） =====================
[env:nodemcu_sender_selftest]
; 与 sender 相同，额外开启 ESPNOW_SELF_TEST 启用 sendImage()
platform = ${env:nodemcu_sender.platform}
board = ${env:nodemcu_sender.board}
framework = ${env:nodemcu_sender.framework}
board_build.flash_mode = ${env:nodemcu_sender.board_build.flash_mode}
board_build.f_cpu = ${env:nodemcu_sender.board_build.f_cpu}
upload_protocol = ${env:nodemcu_sender.upload_protocol}
upload_port = ${env:nodemcu_sender.upload_port}
upload_speed = ${env:nodemcu_sender.upload_speed}
board_build.ldscript = ${env:nodemcu_sender.board_build.ldscript}
lib_deps = ${env:nodemcu_sender.lib_deps}
build_flags = 
	${env:nodemcu_sender.build_flags}
	-DESPNOW_SELF_TEST
src_filter = ${env:nodemcu_sender.src_filter}
